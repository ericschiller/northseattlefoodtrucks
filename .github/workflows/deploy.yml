name: Scrape and Deploy to Pages

on:
  schedule:
    - cron: '0 */3 * * *' # Run every 3 hours
  workflow_dispatch:      # Allow manual triggers
  push:
    branches: [ main ]    # Run on changes to code

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Step 1: Scrape Data ---
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Scrape Breweries
        run: uv run around-the-grounds --preview
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # --- Step 2: Build Nuxt Frontend ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Node Dependencies
        run: cd frontend && npm ci

      - name: Generate Static Site
        run: cd frontend && npm run generate
        env:
          # If deploying to username.github.io/repo/, this must match the repo name
          # You can set this as a secret or let it default to '/' in nuxt.config.ts
          NUXT_APP_BASE_URL: ${{ vars.NUXT_APP_BASE_URL || '/' }}

      # --- Step 3: Deploy to Pages ---
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Nuxt static output is in frontend/.output/public
          path: './frontend/.output/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
