name: Scrape and Deploy to Pages

on:
  schedule:
    - cron: '0 */3 * * *' # Run every 3 hours
  workflow_dispatch:      # Allow manual triggers
  push:
    branches: [ main ]    # Run on changes to code

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Step 1: Scrape Data ---
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Scrape Breweries
        run: uv run around-the-grounds --preview

      # --- Step 2: Build Nuxt Frontend ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Node Dependencies
        run: cd frontend && npm ci

      - name: Generate Static Site
        run: |
          # Auto-detect repo name for baseURL if not explicitly provided
          if [ -z "${{ vars.NUXT_APP_BASE_URL }}" ]; then
            export NUXT_APP_BASE_URL="/${{ github.event.repository.name }}/"
          else
            export NUXT_APP_BASE_URL="${{ vars.NUXT_APP_BASE_URL }}"
          fi
          echo "Using NUXT_APP_BASE_URL=$NUXT_APP_BASE_URL"
          cd frontend && npm run generate
        env:
          NUXT_APP_BASE_URL: ${{ vars.NUXT_APP_BASE_URL }}

      - name: Post-process for GitHub Pages
        run: |
          # Ensure data.json is in the build output (sometimes Nuxt SSG excludes it if not used in a way it detects)
          cp frontend/public/data.json frontend/.output/public/data.json
          
          # Ensure Jekyll doesn't run on the output
          touch frontend/.output/public/.nojekyll
          # List files for debugging
          echo "Build output structure:"
          ls -R frontend/.output/public/

      # --- Step 3: Deploy to Pages ---
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Nuxt static output is in frontend/.output/public
          path: './frontend/.output/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
